services:
  - type: web
    name: calen-design-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: MP_ACCESS_TOKEN
        sync: false
      - key: MP_PUBLIC_KEY
        sync: false
      - key: MP_WEBHOOK_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: JWT_PRIVATE_KEY
        sync: false
      - key: JWT_PUBLIC_KEY
        sync: false
      - key: CORREO_ARGENTINO_URL
        sync: false
      - key: CORREO_ARGENTINO_USER
        sync: false
      - key: CORREO_ARGENTINO_PASSWORD
        sync: false
      - key: CORREO_ARGENTINO_CUSTOMER_ID
        sync: false
      - key: CP_ORIGEN
        sync: false
